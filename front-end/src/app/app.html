<div class="min-h-screen flex flex-col">
  <app-toast></app-toast>

  <header *ngIf="!isLoginRoute()" class="bg-[#F6F7F8] px-4 py-6 sm:px-6 font-['Montserrat'] border-b border-gray-100">
    <div class="mx-auto w-full max-w-5xl">
      <nav class="flex w-full flex-nowrap items-center justify-between gap-3 overflow-x-auto">
        <a routerLink="/users"
          class="inline-flex w-fit cursor-pointer items-center justify-center sm:justify-start sm:justify-self-start gap-2 text-sm font-semibold text-[#000C2F] hover:opacity-90">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M17.3115 15C17.936 15 18.4326 14.6071 18.8785 14.0576C19.7915 12.9328 18.2926 12.034 17.721 11.5938C17.1399 11.1463 16.491 10.8928 15.8332 10.8333M14.9999 9.16667C16.1505 9.16667 17.0832 8.23392 17.0832 7.08333C17.0832 5.93274 16.1505 5 14.9999 5"
              stroke="#141B34" stroke-width="1.5" stroke-linecap="round" />
            <path
              d="M2.68822 15C2.0638 15 1.56715 14.6071 1.1212 14.0576C0.208328 12.9328 1.70715 12.034 2.27879 11.5938C2.8599 11.1463 3.50874 10.8928 4.16659 10.8333M4.58325 9.16667C3.43266 9.16667 2.49992 8.23392 2.49992 7.08333C2.49992 5.93274 3.43266 5 4.58325 5"
              stroke="#141B34" stroke-width="1.5" stroke-linecap="round" />
            <path
              d="M6.73642 12.5927C5.88494 13.1192 3.6524 14.1942 5.01217 15.5395C5.6764 16.1967 6.41619 16.6667 7.34627 16.6667H12.6536C13.5837 16.6667 14.3234 16.1967 14.9877 15.5395C16.3474 14.1942 14.1149 13.1192 13.2634 12.5927C11.2667 11.358 8.7331 11.358 6.73642 12.5927Z"
              stroke="#141B34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            <path
              d="M12.9166 6.25001C12.9166 7.86084 11.6108 9.16668 9.99994 9.16668C8.3891 9.16668 7.08325 7.86084 7.08325 6.25001C7.08325 4.63918 8.3891 3.33334 9.99994 3.33334C11.6108 3.33334 12.9166 4.63918 12.9166 6.25001Z"
              stroke="#141B34" stroke-width="1.5" />
          </svg>
          <span>Usuários</span>
        </a>

        <a routerLink="/users/create" routerLinkActive="opacity-90" aria-label="Adicionar usuário"
          class="inline-flex w-fit cursor-pointer items-center justify-center sm:justify-self-center gap-2 text-sm font-semibold text-[#000C2F] hover:opacity-90">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9.99996 6.66666V13.3333M13.3333 9.99999H6.66663" stroke="#141B34" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round" />
            <path
              d="M18.3333 9.99999C18.3333 5.39761 14.6023 1.66666 9.99996 1.66666C5.39758 1.66666 1.66663 5.39761 1.66663 9.99999C1.66663 14.6023 5.39758 18.3333 9.99996 18.3333C14.6023 18.3333 18.3333 14.6023 18.3333 9.99999Z"
              stroke="#141B34" stroke-width="1.5" />
          </svg>
          <span>Adicionar usuário</span>
        </a>

        <button type="button" (click)="logout()"
          class="inline-flex w-fit cursor-pointer items-center justify-center sm:justify-end sm:justify-self-end gap-2 text-sm font-semibold text-[#9C0E0E] hover:opacity-90">
          <span>Sair</span>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M11.6667 2.57918C11.2858 2.52701 10.8963 2.5 10.5 2.5C6.08173 2.5 2.5 5.85787 2.5 10C2.5 14.1422 6.08173 17.5 10.5 17.5C10.8963 17.5 11.2858 17.473 11.6667 17.4208"
              stroke="#9C0E0E" stroke-width="1.5" stroke-linecap="round" />
            <path
              d="M17.5 9.99999H9.16663M17.5 9.99999C17.5 9.41649 15.838 8.32626 15.4166 7.91666M17.5 9.99999C17.5 10.5835 15.838 11.6737 15.4166 12.0833"
              stroke="#9C0E0E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <main class="flex-1">
    <router-outlet></router-outlet>
  </main>

  <footer *ngIf="!isLoginRoute()" class="bg-[#3C7588] px-4 py-10 sm:px-6 font-['Montserrat']">
    <p class="text-center text-xs sm:text-sm text-white/90">
      © 2024 Top Solutions™. Todos os Direitos Reservados.
    </p>
  </footer>
</div>
