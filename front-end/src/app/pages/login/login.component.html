<div class="min-h-screen grid place-items-center bg-gray-100 px-4 font-['Montserrat']">
  <div class="w-full max-w-lg">
    <div class="rounded-lg border border-gray-200 bg-white p-6 sm:p-8">
      <h1 class="text-center text-3xl font-bold leading-tight" style="color: #000C2F">
        Usuários
      </h1>
      <p class="mt-1.5 text-center text-lg font-semibold text-sky-600">
        Painel Administrativo
      </p>

      <div class="mx-auto mt-6 w-full max-w-md">
        <div class="mb-3 min-h-10">
          <div class="rounded-lg bg-red-50 p-3 text-xs font-medium text-red-700" role="alert"
            [class.invisible]="!errorMessage">
            {{ errorMessage || ' ' }}
          </div>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
          <div>
            <label for="username" class="mb-1 block text-sm font-medium text-gray-600">
              E-mail
            </label>
            <input id="username" type="text" formControlName="username" autocomplete="username"
              class="h-11 w-full rounded-lg border border-gray-200 bg-white px-4 text-sm text-[#000C2F] placeholder:text-gray-300 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500/20"
              placeholder="Digite seu e-mail" />
            <p class="mt-2 min-h-4 text-xs font-medium text-red-600">
              {{ (loginForm.get('username')?.invalid && loginForm.get('username')?.touched) ? 'E-mail é obrigatório.' :
              ' ' }}
            </p>
          </div>

          <div>
            <label for="password" class="mb-1 block text-sm font-medium text-gray-600">
              Senha
            </label>
            <input id="password" type="password" formControlName="password" autocomplete="current-password"
              class="h-11 w-full rounded-lg border border-gray-200 bg-white px-4 text-sm text-[#000C2F] placeholder:text-gray-300 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500/20"
              placeholder="Digite sua senha" />
            <p class="mt-2 min-h-4 text-xs font-medium text-red-600">
              {{ (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) ? 'Senha é obrigatória.' : '
              ' }}
            </p>
          </div>

          <button type="submit" [disabled]="loginForm.invalid"
            class="h-11 w-full cursor-pointer rounded-lg bg-sky-600 text-sm text-white transition hover:brightness-95 focus:outline-none focus-visible:ring-2 focus-visible:ring-sky-600/40 focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50">
            Entrar
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
