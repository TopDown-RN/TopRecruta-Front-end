<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4 font-['Montserrat']">
  <div class="w-full max-w-lg">
    <div class="bg-white rounded-lg shadow-md p-5 sm:p-8">
      <h1 class="text-center text-2xl md:text-3xl font-bold leading-tight tracking-tight mb-1" style="color: #000C2F">
        Usuários
      </h1>
      <p class="text-center text-base md:text-lg font-semibold tracking-tight mb-5 sm:mb-6 text-[#048ABF]">
        Painel Administrativo
      </p>

      @if (errorMessage) {
        <div
          class="mb-4 p-3 rounded-lg bg-red-50 text-red-700 text-sm"
          role="alert"
        >
          {{ errorMessage }}
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
            E-mail
          </label>
          <input
            id="username"
            type="text"
            formControlName="username"
            autocomplete="username"
            class="w-full min-h-12 py-3 px-4 border border-[#E5E5E5] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#048ABF] focus:border-[#048ABF]"
            placeholder="Digite seu e-mail"
          />
          @if (loginForm.get('username')?.invalid && loginForm.get('username')?.touched) {
            <p class="mt-1 text-sm text-red-600">E-mail é obrigatório.</p>
          }
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
            Senha
          </label>
          <input
            id="password"
            type="password"
            formControlName="password"
            autocomplete="current-password"
            class="w-full min-h-12 py-3 px-4 border border-[#E5E5E5] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#048ABF] focus:border-[#048ABF]"
            placeholder="Digite sua senha"
          />
          @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
            <p class="mt-1 text-sm text-red-600">Senha é obrigatória.</p>
          }
        </div>

        <button
          type="submit"
          [disabled]="loginForm.invalid"
          class="w-full min-h-11 py-3 bg-[#048ABF] text-white font-semibold rounded-lg hover:bg-[#0379a8] focus:outline-none focus:ring-2 focus:ring-[#048ABF] focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
        >
          Entrar
        </button>
      </form>
    </div>
  </div>
</div>
