services:
  postgres:
    # Debian-based image; matches host arch automatically (avoids exec format error from wrong platform pin).
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: toprecruta
      POSTGRES_PASSWORD: toprecruta
      POSTGRES_DB: toprecruta
    ports:
      - '5434:5432'
    volumes:
      - toprecruta_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U toprecruta -d toprecruta']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://toprecruta:toprecruta@postgres:5432/toprecruta?schema=public
      PORT: '3000'
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars}
      JWT_EXPIRES_DAYS: '7'
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-123456}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  toprecruta_pg:
